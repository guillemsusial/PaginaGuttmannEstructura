<div class="card">
    <div class="card-header">
        Usuarios
    </div>
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Email</th>
                    <th>Año nacimiento</th>
                    <th>Estudios</th>
                    <th>Sexo</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of Users; let iControl=index">
                    <td>{{ user.id }}</td>
                    <td>{{ user.Name }}</td>
                    <td>{{ user.LastName }}</td>
                    <td>{{ user.Email }}</td>
                    <td>{{ user.anioNacimiento }}</td>
                    <td>{{ user.Estudios }}</td>
                    <td>{{ user.Sexo }}</td>
                    <td>
                        <a class="btn btn-info" routerLink="/edit-user/{{ user.id }}"> Editar </a> |
                        <a class="btn btn-danger" (click)="deleteUser(user.id,iControl)" role="button"> Borrar </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
