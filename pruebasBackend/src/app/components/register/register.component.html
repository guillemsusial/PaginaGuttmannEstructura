<div class="card">
  <div class="card-header">
    Agregar user
  </div>
  <div class="card-body">
    <form [formGroup]="formRegister" (ngSubmit)="enviarDatos()" class="row g-3 needs-validation">
      <div class="col-md-4">
        <label class="form-label">Nombre</label>
        <input formControlName="Name" type="text" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Apellidos</label>
        <input formControlName="LastName" type="text" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Email</label>
        <input formControlName="Email" type="text" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Contraseña</label>
        <input formControlName="Password" type="password" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Año de nacimiento</label>
        <select formControlName="anioNacimiento" class="form-select" required>
          <option>2000</option>
          <option>2001</option>
          <option>2002</option>
          <option>2003</option>
          <option>2004</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Estudios</label>
        <select formControlName="Estudios" class="form-select" required>
          <option>Sin estudios</option>
          <option>ESO</option>
          <option>CFGM</option>
          <option>CFGS</option>
          <option>Universidad</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Sexo</label>
        <select formControlName="Sexo" class="form-select" required>
          <option>Hombre</option>
          <option>Mujer</option>
          <option>Helicoptero</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="col-12">
        <button class="btn btn-primary" type="submit">Enviar</button>
      </div>
    </form>
  </div>
</div>
